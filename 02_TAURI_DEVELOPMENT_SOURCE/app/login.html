<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#173a67" />
    <meta name="description" content="강남대 공고 길잡이 학생·관리자 통합 Google 로그인" />
    <title>강남대 공고 길잡이 · 로그인</title>
    <link rel="icon" href="./assets/icons/icon.ico?v=20260724-official-symbol-cutout-v3" sizes="any" />
    <link rel="icon" type="image/png" href="./assets/icons/32x32.png?v=20260724-official-symbol-cutout-v3" sizes="32x32" />
    <link rel="apple-touch-icon" href="./assets/icons/128x128.png?v=20260724-official-symbol-cutout-v3" />
    <link rel="preload" href="./assets/fonts/PretendardVariable.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="./styles.css?v=20260724-brand-align-v4" />
    <script type="module" src="./firebase-config.js?v=20260724-unified-login"></script>
    <script src="./firestore-store.js?v=20260724-spark-guard" defer></script>
    <script src="./account-access.js?v=20260724-unified-login" defer></script>
    <script src="./login.js?v=20260724-unified-login" defer></script>
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card" aria-labelledby="login-title">
        <a class="login-brand" href="./index.html" aria-label="강남대 공고 길잡이 홈">
          <img class="brand-mark" src="./assets/branding/kangnam-symbol.png?v=20260724-official-symbol-cutout-v3" alt="" aria-hidden="true" />
          <span>
            <strong>강남대 공고 길잡이</strong>
            <small>학교 계정 통합 로그인</small>
          </span>
        </a>

        <div class="login-copy">
          <p class="section-label">학생·관리자 통합 로그인</p>
          <h1 id="login-title">학교 계정으로 로그인하세요</h1>
          <p>하나의 로그인으로 계정 권한을 확인한 뒤 학생 또는 관리자 화면으로 자동 이동합니다.</p>
        </div>

        <button class="google-login-card-button" id="login-google-button" type="button">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.6 12.2c0-.8-.1-1.5-.2-2.2H12v4.2h5.9c-.3 1.4-1 2.5-2.1 3.2v2.7h3.4c2-1.8 3.4-4.5 3.4-7.9Z" />
            <path fill="#34A853" d="M12 23c3 0 5.5-1 7.3-2.8l-3.4-2.7c-.9.6-2.2 1-3.9 1-3 0-5.5-2-6.4-4.8H2.1v2.8C3.9 20.3 7.7 23 12 23Z" />
            <path fill="#FBBC05" d="M5.6 13.7c-.2-.7-.4-1.4-.4-2.2s.1-1.5.4-2.2V6.5H2.1C1.4 8 1 9.7 1 11.5s.4 3.5 1.1 5l3.5-2.8Z" />
            <path fill="#EA4335" d="M12 4.5c1.6 0 3 .6 4.1 1.6l3.1-3.1C17.4 1.2 14.9.1 12 .1 7.7.1 3.9 2.7 2.1 6.5l3.5 2.8C6.5 6.5 9 4.5 12 4.5Z" />
          </svg>
          Google 학교 계정으로 계속하기
        </button>

        <div class="login-route-guide" aria-label="로그인 후 이동 안내">
          <div>
            <span>학생</span>
            <strong>학생 화면으로 이동</strong>
            <small>등록된 관리자 계정이 아니면 학생으로 이용합니다.</small>
          </div>
          <div>
            <span>관리자</span>
            <strong>관리자 메뉴로 이동</strong>
            <small>사전에 등록된 관리자 계정만 권한을 사용할 수 있습니다.</small>
          </div>
        </div>

        <div class="login-state" id="login-state" role="status" aria-live="polite">
          <strong>로그인 대기</strong>
          <span>로그인 후 계정 권한을 자동으로 확인합니다.</span>
        </div>

        <div class="login-actions">
          <a class="button secondary" id="login-student-link" href="./index.html">로그인 없이 공고 보기</a>
          <button class="button secondary" id="login-logout-button" type="button" disabled>로그아웃</button>
        </div>
      </section>
    </main>
  </body>
</html>
