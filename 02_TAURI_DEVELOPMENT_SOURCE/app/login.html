<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#173a67" />
    <meta name="description" content="강남대 공고 길잡이 관리자 Google 로그인" />
    <title>강남대 공고 길잡이 · 로그인</title>
    <link rel="icon" href="./assets/icons/icon.ico?v=20260723-transparent-icon-v2" sizes="any" />
    <link rel="icon" type="image/png" href="./assets/icons/32x32.png?v=20260723-transparent-icon-v2" sizes="32x32" />
    <link rel="apple-touch-icon" href="./assets/icons/128x128.png?v=20260723-transparent-icon-v2" />
    <link rel="preload" href="./assets/fonts/PretendardVariable.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./firebase-config.js?v=20260723-auth-state"></script>
    <script src="./admin-config.js?v=20260723-admin-env"></script>
    <script src="./login.js?v=20260723-login-actions" defer></script>
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card" aria-labelledby="login-title">
        <a class="login-brand" href="./index.html" aria-label="강남대 공고 길잡이 홈">
          <svg class="brand-mark" aria-hidden="true" viewBox="0 0 44 44">
            <path d="M8 9.5 22 4l14 5.5v10.8c0 9.1-5.9 16.2-14 19.7-8.1-3.5-14-10.6-14-19.7V9.5Z" />
            <path d="M14.5 16.5c2.8 0 5.3.7 7.5 2.2 2.2-1.5 4.7-2.2 7.5-2.2v11.2c-2.8 0-5.3.7-7.5 2.2-2.2-1.5-4.7-2.2-7.5-2.2V16.5Z" />
            <path d="M22 18.7v11.2" />
          </svg>
          <span>
            <strong>강남대 공고 길잡이</strong>
            <small>관리자 Google 로그인</small>
          </span>
        </a>

        <div class="login-copy">
          <p class="section-label">Firebase Authentication</p>
          <h1 id="login-title">Google 계정으로 로그인하세요</h1>
          <p>관리자 권한은 등록된 Google 이메일 기준으로 확인됩니다. 학생은 로그인 없이 공개된 공고와 FAQ를 볼 수 있습니다.</p>
        </div>

        <button class="google-login-card-button" id="login-google-button" type="button">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.6 12.2c0-.8-.1-1.5-.2-2.2H12v4.2h5.9c-.3 1.4-1 2.5-2.1 3.2v2.7h3.4c2-1.8 3.4-4.5 3.4-7.9Z" />
            <path fill="#34A853" d="M12 23c3 0 5.5-1 7.3-2.8l-3.4-2.7c-.9.6-2.2 1-3.9 1-3 0-5.5-2-6.4-4.8H2.1v2.8C3.9 20.3 7.7 23 12 23Z" />
            <path fill="#FBBC05" d="M5.6 13.7c-.2-.7-.4-1.4-.4-2.2s.1-1.5.4-2.2V6.5H2.1C1.4 8 1 9.7 1 11.5s.4 3.5 1.1 5l3.5-2.8Z" />
            <path fill="#EA4335" d="M12 4.5c1.6 0 3 .6 4.1 1.6l3.1-3.1C17.4 1.2 14.9.1 12 .1 7.7.1 3.9 2.7 2.1 6.5l3.5 2.8C6.5 6.5 9 4.5 12 4.5Z" />
          </svg>
          Google로 계속하기
        </button>

        <div class="login-state" id="login-state">
          <strong>로그인 대기</strong>
          <span>팝업이 차단되면 브라우저에서 팝업 허용 후 다시 시도해 주세요.</span>
        </div>

        <div class="login-actions">
          <a class="button secondary" href="./index.html">학생 페이지로 돌아가기</a>
          <a class="button primary" href="./admin.html" data-admin-action data-min-role="editor" hidden>관리자 메뉴</a>
          <a class="button primary" href="./members.html" data-admin-action data-min-role="owner" hidden>관리자 관리</a>
          <a class="button primary" href="./publish.html" data-admin-action data-min-role="editor" hidden>AI 공고 생성 및 공개</a>
          <a class="button primary" href="./manage.html" data-admin-action data-min-role="editor" hidden>공개된 공고 관리</a>
          <button class="button secondary" id="login-logout-button" type="button" hidden disabled>로그아웃</button>
        </div>
      </section>
    </main>
  </body>
</html>
