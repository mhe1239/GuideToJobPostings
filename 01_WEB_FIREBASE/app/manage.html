<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#173a67" />
    <meta name="description" content="강남대 공고 길잡이 공개된 공고 관리" />
    <title>강남대 공고 길잡이 · 공개된 공고 관리</title>
    <link rel="icon" href="./assets/icons/icon.ico?v=20260724-official-symbol-cutout-v3" sizes="any" />
    <link rel="icon" type="image/png" href="./assets/icons/32x32.png?v=20260724-official-symbol-cutout-v3" sizes="32x32" />
    <link rel="apple-touch-icon" href="./assets/icons/128x128.png?v=20260724-official-symbol-cutout-v3" />
    <link rel="preload" href="./assets/fonts/PretendardVariable.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="./styles.css?v=20260724-admin-workspace" />
    <script type="module" src="./firebase-config.js?v=20260722-url-reset"></script>
    <script src="./firestore-store.js?v=20260724-spark-guard" defer></script>
    <script src="./account-access.js?v=20260724-unified-login" defer></script>
    <script src="./admin-guard.js?v=20260724-unified-login" defer></script>
    <script src="./admin.js?v=20260724-admin-add-fix" defer></script>
  </head>
  <body class="admin-guarded-page" data-admin-guard="pending" data-admin-roles="owner editor">
    <div class="admin-guard-message" id="admin-guard-message" role="alert" aria-live="assertive">관리자 권한을 확인하고 있습니다.</div>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="./index.html" aria-label="강남대 공고 길잡이 홈">
          <img class="brand-mark" src="./assets/branding/kangnam-symbol.png?v=20260724-official-symbol-cutout-v3" alt="" aria-hidden="true" />
          <span class="brand-copy">
            <strong>강남대 공고 길잡이</strong>
            <span>공개 공고 관리</span>
          </span>
        </a>
        <a class="auth-nav" href="./admin.html"><span aria-hidden="true"></span>관리자 메뉴</a>
      </div>
    </header>

    <main class="page-shell admin-page-shell">
      <nav class="breadcrumb" aria-label="관리자 이동 경로">
        <a class="button secondary" href="./admin.html">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M19 12H5M11 6l-6 6 6 6" /></svg>
          관리자 메뉴로
        </a>
        <svg aria-hidden="true" viewBox="0 0 16 16"><path d="m6 3 5 5-5 5" /></svg>
        <span aria-current="page">공개된 공고 관리</span>
      </nav>

      <section class="admin-section" id="admin-review" aria-labelledby="manage-title">
        <div class="admin-heading">
          <div>
            <p class="section-label">공개된 공고 관리</p>
            <h1 id="manage-title">학생에게 공개된 공고를 수정하거나 삭제합니다</h1>
          </div>
          <span class="review-status" id="review-status">보기만 가능</span>
        </div>

        <div class="admin-grid manage-grid admin-workspace-grid" data-requires-admin>
          <section class="admin-panel published-panel">
            <div class="panel-title-row">
              <h2>공개된 공고 목록</h2>
              <span class="draft-chip" id="published-count-chip">0개</span>
            </div>
            <div class="published-list" id="published-list" aria-live="polite"></div>
            <p class="approval-note" id="published-note">수정하거나 삭제할 공고를 선택하세요. 삭제할 때는 한 번 더 확인합니다.</p>
          </section>

          <section class="admin-panel draft-panel">
            <div class="panel-title-row">
              <h2>공고 수정</h2>
              <span class="draft-chip" id="draft-chip">미선택</span>
            </div>
            <div class="draft-empty" id="draft-empty">
              <strong>선택된 공고가 없습니다.</strong>
              <span>왼쪽 목록에서 공고를 선택하면 수정 영역이 열립니다.</span>
            </div>
            <div class="draft-fields" id="draft-fields" hidden>
              <label>공식 공고 URL<input id="official-notice-url" type="url" readonly /></label>
              <label>공고 요약<textarea id="draft-summary" rows="5"></textarea></label>
              <label>FAQ 초안<textarea id="draft-faq" rows="7"></textarea></label>
              <label>답변 근거<textarea id="draft-evidence" rows="5"></textarea></label>
            </div>
            <div class="published-actions">
              <button class="button secondary" id="save-published-button" type="button" disabled>수정 저장</button>
              <button class="button danger" id="delete-published-button" type="button" disabled>삭제</button>
            </div>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
